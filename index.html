<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results - CI/CD Project</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .result-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #3498db; color: white; }
        tr:hover { background-color: #f9f9f9; }
        .status-pass { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>
    <div class="result-card">
        <h1>a. Student Academic Results</h1>
        <table>

                <tr>
                    <th>Reg. Number</th>
                    <th>Subject</th>
                    <th>Grade</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2024DEV001</td>
                    <td>Cloud Computing</td>
                    <td>A+</td>
                    <td class="status-pass">PASS</td>
                </tr>
                <tr>
                    <td>2024DEV001</td>
                    <td>Docker & Kubernetes</td>
                    <td>O</td>
                    <td class="status-pass">PASS</td>
                </tr>
                <tr>
                    <td>2024DEV001</td>
                    <td>Jenkins Pipelines</td>
                    <td>A</td>
                    <td class="status-pass">PASS</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
